name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always

jobs:
  check:
    name: Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo check --all-targets

  fmt:
    name: Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - run: cargo fmt --all -- --check

  clippy:
    name: Clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
      - run: cargo clippy --all-targets -- -D warnings

  test:
    name: Test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo test --all-targets

  # Workspace refactor (#279) — verify coding-brain-core builds and tests
  # standalone, without the binary crate. Guards the
  # coding-brain → coding-brain-core dependency direction at the workspace level.
  core-standalone:
    name: Core (standalone)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
      - name: Build coding-brain-core standalone
        run: cargo build -p coding-brain-core
      - name: Clippy coding-brain-core standalone
        run: cargo clippy -p coding-brain-core --all-targets -- -D warnings
      - name: Test coding-brain-core standalone
        run: cargo test -p coding-brain-core

  # Same guarantee for coding-brain-tui (#275): builds and tests without the
  # binary crate. Catches accidental `crate::brain::*` or other binary refs
  # that would only break under workspace builds.
  tui-standalone:
    name: TUI (standalone)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
      - name: Build coding-brain-tui standalone
        run: cargo build -p coding-brain-tui
      - name: Clippy coding-brain-tui standalone
        run: cargo clippy -p coding-brain-tui --all-targets -- -D warnings
      - name: Test coding-brain-tui standalone
        run: cargo test -p coding-brain-tui

  # Layering check: nothing inside coding-brain-core may reference binary-crate
  # modules. This is a textual guard on top of the standalone build above —
  # the build would already fail on a real upward dep, but grep catches
  # subtler attempts (e.g. cfg-gated paths that don't trip on this matrix).
  layering:
    name: Layering
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: No binary modules inside coding-brain-core
        run: |
          set -e
          PATTERN='crate::(brain|init|launch|hooks|recorder|session_recorder|app|ui|demo)\b'
          if grep -rEn "${PATTERN}" crates/coding-brain-core/src/ ; then
            echo "::error::coding-brain-core must not depend on binary-crate modules. See #279 dependency rule."
            exit 1
          fi
          echo "coding-brain-core has no upward dependencies on the binary crate."
